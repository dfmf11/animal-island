<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Axonometric Animal Island</title>
    <style>
        body { margin: 0; overflow: hidden; background: #a3d5ee; font-family: 'Segoe UI', sans-serif; }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.8);
            padding: 15px;
            border-radius: 12px;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            z-index: 10;
        }
        h1 { margin: 0 0 5px 0; font-size: 18px; color: #2c3e50; }
        p { margin: 0; font-size: 14px; color: #576574; }
        
        /* Camera UI */
        #camera-controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            z-index: 20;
        }
        #shutter {
            width: 70px;
            height: 70px;
            background: white;
            border: 5px solid #2c3e50;
            border-radius: 50%;
            cursor: pointer;
            outline: none;
            transition: transform 0.1s, background 0.1s;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        #shutter:active {
            transform: scale(0.9);
            background: #ecf0f1;
        }
        #shutter svg {
            width: 30px;
            height: 30px;
            fill: #2c3e50;
        }
        #viewfinder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            border: 2px solid rgba(255, 255, 255, 0.5);
            pointer-events: none;
            box-sizing: border-box;
        }
        #viewfinder::before, #viewfinder::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: white;
            border-style: solid;
        }
        #viewfinder::before { top: -2px; left: -2px; border-width: 4px 0 0 4px; }
        #viewfinder::after { bottom: -2px; right: -2px; border-width: 0 4px 4px 0; }

        #flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
        }
        
        canvas { display: block; }
    </style>
</head>
<body>
    <!--<div id="ui">
        <h1>Axonometric Animal Island</h1>
        <p>Drag to rotate • Scroll to zoom</p>
    </div>-->

    <div id="viewfinder"></div>

    <div id="camera-controls">
        <button id="shutter" title="Take Photo">
            <svg viewBox="0 0 24 24"><path d="M4 4h3l2-2h6l2 2h3a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2m8 3a5 5 0 0 0-5 5 5 5 0 0 0 5 5 5 5 0 0 0 5-5 5 5 0 0 0-5-5m0 2a3 3 0 0 1 3 3 3 3 0 0 1-3 3 3 3 0 0 1-3-3 3 3 0 0 1 3-3z"/></svg>
        </button>
        <p style="color: white; text-shadow: 0 1px 3px rgba(0,0,0,0.5); font-weight: bold; margin: 0;">CAPTURE ANIMAL</p>
    </div>

    <div id="flash"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        let scene, camera, renderer, island, water;
        let mouseX = 0, mouseY = 0;
        let targetRotationX = Math.PI / 4;
        let targetRotationY = Math.PI / 4;
        let isMouseDown = false;
        let lastMouseX = 0, lastMouseY = 0;

        function init() {
            // Scene Setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa3d5ee);

            // Camera - Orthographic for that Axonometric/Isometric look
            const aspect = window.innerWidth / window.innerHeight;
            const d = 10;
            camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 1000);
            camera.position.set(20, 20, 20);
            camera.lookAt(scene.position);

            // Renderer - preserveDrawingBuffer is key for taking screenshots
            renderer = new THREE.WebGLRenderer({ 
                antialias: true,
                preserveDrawingBuffer: true 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
            sunLight.position.set(10, 20, 10);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 2048;
            sunLight.shadow.mapSize.height = 2048;
            scene.add(sunLight);

            createIsland();
            createAnimals();
            
            // Event Listeners
            window.addEventListener('resize', onWindowResize, false);
            document.addEventListener('mousedown', (e) => {
                if (e.target.closest('#shutter')) return;
                isMouseDown = true;
            });
            document.addEventListener('mouseup', () => isMouseDown = false);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('wheel', onMouseWheel);
            
            // Shutter Button Logic
            document.getElementById('shutter').addEventListener('click', takePhoto);

            animate();
        }

        function takePhoto() {
            // 1. Flash effect
            const flash = document.getElementById('flash');
            flash.style.opacity = '1';
            setTimeout(() => {
                flash.style.transition = 'opacity 0.5s';
                flash.style.opacity = '0';
                setTimeout(() => { flash.style.transition = 'none'; }, 500);
            }, 50);

            // 2. Capture canvas
            const dataURL = renderer.domElement.toDataURL('image/png');
            
            // 3. Download image
            const link = document.createElement('a');
            link.download = `animal-photo-${Date.now()}.png`;
            link.href = dataURL;
            link.click();
        }

        function createIsland() {
            island = new THREE.Group();

            // Water
            const waterGeo = new THREE.CylinderGeometry(8, 8, 1, 32);
            const waterMat = new THREE.MeshPhongMaterial({ color: 0x48cae4, transparent: true, opacity: 0.8 });
            water = new THREE.Mesh(waterGeo, waterMat);
            water.position.y = -0.5;
            island.add(water);

            // Main Land (Sand/Grass)
            const landGeo = new THREE.CylinderGeometry(5, 6, 2, 8);
            const landMat = new THREE.MeshPhongMaterial({ color: 0x2ecc71 });
            const land = new THREE.Mesh(landGeo, landMat);
            land.receiveShadow = true;
            land.castShadow = true;
            island.add(land);

            // Rocks
            addRock(-3, 1, 2, 1.2);
            addRock(3, 1, -2, 0.8);
            
            // Trees
            addTree(2, 1, 2);
            addTree(-2, 1, -3);
            addTree(0, 1, -4);

            scene.add(island);
        }

        function addRock(x, y, z, s) {
            const rockGeo = new THREE.DodecahedronGeometry(s);
            const rockMat = new THREE.MeshPhongMaterial({ color: 0x95a5a6 });
            const rock = new THREE.Mesh(rockGeo, rockMat);
            rock.position.set(x, y, z);
            rock.rotation.set(Math.random(), Math.random(), Math.random());
            rock.castShadow = true;
            island.add(rock);
        }

        function addTree(x, y, z) {
            const trunkGeo = new THREE.CylinderGeometry(0.2, 0.3, 1.5);
            const trunkMat = new THREE.MeshPhongMaterial({ color: 0x795548 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.set(x, y + 0.75, z);
            trunk.castShadow = true;

            const leavesGeo = new THREE.ConeGeometry(1, 2, 8);
            const leavesMat = new THREE.MeshPhongMaterial({ color: 0x27ae60 });
            const leaves = new THREE.Mesh(leavesGeo, leavesMat);
            leaves.position.y = 1.5;
            leaves.castShadow = true;
            
            trunk.add(leaves);
            island.add(trunk);
        }

        function createAnimals() {
            // Bear (Boxy)
            const bear = createAnimalGroup(0x8d6e63);
            bear.position.set(-1, 1.2, 1);
            bear.name = "bear";
            island.add(bear);

            // Rabbit (White)
            const rabbit = createAnimalGroup(0xffffff, 0.4);
            rabbit.position.set(2, 1.2, -1);
            rabbit.name = "rabbit";
            island.add(rabbit);

            // Bird (Yellow)
            const bird = createAnimalGroup(0xf1c40f, 0.3);
            bird.position.set(-2, 3, -1);
            bird.name = "bird";
            island.add(bird);
        }

        function createAnimalGroup(color, scale = 0.6) {
            const group = new THREE.Group();
            
            // Body
            const bodyGeo = new THREE.BoxGeometry(1, 1, 1.2);
            const bodyMat = new THREE.MeshPhongMaterial({ color: color });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.castShadow = true;
            group.add(body);

            // Head
            const headGeo = new THREE.BoxGeometry(0.7, 0.7, 0.7);
            const head = new THREE.Mesh(headGeo, bodyMat);
            head.position.set(0, 0.5, 0.6);
            head.castShadow = true;
            group.add(head);

            group.scale.set(scale, scale, scale);
            return group;
        }

        function onMouseMove(event) {
            if (isMouseDown) {
                const deltaX = event.clientX - lastMouseX;
                const deltaY = event.clientY - lastMouseY;
                targetRotationY += deltaX * 0.01;
                targetRotationX += deltaY * 0.01;
                targetRotationX = Math.max(0.2, Math.min(1.4, targetRotationX));
            }
            lastMouseX = event.clientX;
            lastMouseY = event.clientY;
        }

        function onMouseWheel(event) {
            camera.zoom -= event.deltaY * 0.001;
            camera.zoom = Math.max(0.5, Math.min(3, camera.zoom));
            camera.updateProjectionMatrix();
        }

        function onWindowResize() {
            const aspect = window.innerWidth / window.innerHeight;
            const d = 10;
            camera.left = -d * aspect;
            camera.right = d * aspect;
            camera.top = d;
            camera.bottom = -d;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Smoothly rotate island
            island.rotation.y += (targetRotationY - island.rotation.y) * 0.1;
            
            // Update Camera Position based on target rotation X
            const radius = 35;
            camera.position.x = radius * Math.cos(targetRotationX) * Math.sin(0);
            camera.position.y = radius * Math.sin(targetRotationX);
            camera.position.z = radius * Math.cos(targetRotationX) * Math.cos(0);
            camera.lookAt(0,0,0);

            // Animate Water
            water.position.y = -0.5 + Math.sin(Date.now() * 0.002) * 0.1;

            // Animate Animals
            const bear = island.getObjectByName("bear");
            if(bear) bear.position.y = 1.2 + Math.abs(Math.sin(Date.now() * 0.005) * 0.2);

            const rabbit = island.getObjectByName("rabbit");
            if(rabbit) {
                rabbit.position.y = 1.1 + Math.abs(Math.sin(Date.now() * 0.01) * 0.3);
                rabbit.rotation.y += 0.02;
            }

            const bird = island.getObjectByName("bird");
            if(bird) {
                bird.position.y = 3 + Math.sin(Date.now() * 0.003) * 0.5;
                bird.position.x = Math.cos(Date.now() * 0.001) * 3;
                bird.position.z = Math.sin(Date.now() * 0.001) * 3;
                bird.rotation.y = -Date.now() * 0.001 + Math.PI/2;
            }

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
